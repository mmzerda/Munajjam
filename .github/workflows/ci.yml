name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install lightweight dependencies for CI
        working-directory: ./munajjam
        run: |
          python -m pip install --upgrade pip
          # Install only lightweight deps needed for unit tests (skip torch/transformers)
          pip install \
            "pydantic>=2.0.0" \
            "pydantic-settings>=2.0.0" \
            "numpy>=1.24.0" \
            "librosa>=0.10.0" \
            "pydub>=0.25.1" \
            "pandas>=2.0.0" \
            "rapidfuzz>=3.0.0" \
            "pytest>=7.0.0" \
            "pytest-asyncio>=0.21.0" \
            "ruff>=0.1.0" \
            "mypy>=1.0.0"
          # Install package itself without heavy optional deps
          pip install -e . --no-deps

      - name: Lint with ruff
        working-directory: ./munajjam
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        working-directory: ./munajjam
        run: mypy munajjam --ignore-missing-imports

      - name: Run tests
        working-directory: ./munajjam
        run: pytest tests/unit/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        working-directory: ./munajjam
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: munajjam/dist/
